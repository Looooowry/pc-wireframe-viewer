<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Cloud & Wireframe Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    font-size: 14px;
  }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100%; }
  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px;
    background: #fafafa;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar .title {
    font-weight: 600; font-size: 15px; white-space: nowrap;
    color: #333;
  }
  #topbar .spacer { flex: 1; }
  #main { display: flex; flex: 1; overflow: hidden; }
  #sidebar {
    width: 240px; flex-shrink: 0;
    background: #fafafa;
    border-right: 1px solid #e0e0e0;
    overflow-y: auto;
    padding: 12px;
  }
  #viewport-area { flex: 1; position: relative; overflow: hidden; }

  /* Controls */
  select, button, input[type="number"] {
    font-family: inherit; font-size: 13px;
    border: 1px solid #d0d0d0;
    border-radius: 4px;
    padding: 4px 8px;
    background: #fff;
    color: #333;
    cursor: pointer;
  }
  select:hover, button:hover { border-color: #999; background: #f5f5f5; }
  button.active { background: #e3f2fd; border-color: #2196f3; color: #1976d2; }
  select { min-width: 100px; cursor: default; }

  /* Sidebar sections */
  .section {
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    color: #888; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .layer-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
    cursor: pointer;
    user-select: none;
  }
  .layer-item:hover { background: #f0f0f0; }
  .layer-checkbox {
    width: 16px; height: 16px;
    border: 2px solid #ccc;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .layer-item.checked .layer-checkbox {
    background: var(--layer-color, #2196f3);
    border-color: var(--layer-color, #2196f3);
  }
  .layer-item.checked .layer-checkbox::after {
    content: '';
    width: 4px; height: 8px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .layer-color {
    width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.1);
  }
  .layer-name { flex: 1; font-size: 13px; }

  /* Sliders */
  .slider-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .slider-row label { font-size: 12px; color: #555; min-width: 60px; }
  .slider-row input[type="range"] {
    flex: 1; height: 4px; -webkit-appearance: none;
    background: #ddd; border-radius: 2px; outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #2196f3; cursor: pointer;
  }
  .slider-row .value {
    font-size: 11px; color: #888; min-width: 30px; text-align: right;
  }

  /* Toggle */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0; cursor: pointer;
  }
  .toggle-row label { font-size: 12px; color: #555; cursor: pointer; }
  .toggle {
    width: 32px; height: 18px; background: #ccc; border-radius: 9px;
    position: relative; cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: #2196f3; }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 16px; }

  /* Viewport */
  #viewport {
    width: 100%; height: 100%;
    position: relative;
  }
  #single-canvas { width: 100%; height: 100%; display: block; }

  /* Grid mode */
  #grid-container {
    width: 100%; height: 100%;
    display: grid;
    gap: 2px;
    background: #e0e0e0;
  }
  #grid-container.layout-2x2 {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  #grid-container.layout-1x4 {
    grid-template-columns: 1fr 1fr 1fr 1fr;
    grid-template-rows: 1fr;
  }
  #grid-container.layout-1x3 {
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr;
  }
  .grid-cell {
    position: relative;
    background: #fff;
    overflow: hidden;
  }
  .grid-cell canvas { width: 100%; height: 100%; display: block; }
  .grid-label {
    position: absolute; top: 8px; left: 10px;
    font-size: 12px; font-weight: 600; color: #333;
    background: rgba(255,255,255,0.85);
    padding: 2px 8px; border-radius: 3px;
    pointer-events: none;
    z-index: 5;
  }
  .grid-cell select {
    position: absolute; top: 8px; right: 8px;
    z-index: 5; font-size: 11px; padding: 2px 6px;
  }

  /* Buttons */
  .btn-group { display: flex; gap: 4px; }
  .btn-icon {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #d0d0d0; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 14px;
    color: #555;
  }
  .btn-icon:hover { background: #f0f0f0; }

  /* Loading */
  #loading-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.9);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  #loading-overlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e0e0e0;
    border-top-color: #2196f3;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Info bar */
  #info-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 4px 12px;
    background: rgba(250,250,250,0.9);
    border-top: 1px solid #e0e0e0;
    font-size: 11px; color: #888;
    display: flex; gap: 16px;
    z-index: 5;
  }

  /* Clean mode */
  body.clean #topbar, body.clean #sidebar, body.clean #info-bar { display: none; }
  body.clean #main { flex-direction: row; }
  body.clean #viewport-area { width: 100%; }

  /* Nav buttons */
  .nav-btns { display: flex; gap: 2px; }
  .nav-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #d0d0d0; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 13px;
    color: #555;
  }
  .nav-btn:hover { background: #f0f0f0; }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div id="topbar">
    <span class="title">PC & Wireframe Viewer</span>
    <select id="sample-select"><option value="">Loading...</option></select>
    <div class="nav-btns">
      <button class="nav-btn" id="btn-prev" title="Previous">&#9664;</button>
      <button class="nav-btn" id="btn-next" title="Next">&#9654;</button>
    </div>
    <select id="view-mode">
      <option value="single">Single (Overlay)</option>
      <option value="grid-2x2">Grid 2x2</option>
      <option value="grid-1x4">Row 1x4</option>
      <option value="grid-1x3">Row 1x3</option>
      <option value="whole">Whole Area</option>
    </select>
    <span style="font-size:12px;color:#555;margin-left:8px;">Dataset:</span>
    <select id="dataset-select">
      <option value="main">Main (xyz/gt/pred)</option>
      <option value="patch32">Patch32</option>
    </select>
    <div class="spacer"></div>
    <label style="font-size:12px;color:#555;">BG:</label>
    <input type="color" id="bg-color" value="#ffffff" style="width:28px;height:28px;border:1px solid #d0d0d0;border-radius:4px;cursor:pointer;">
    <button id="btn-screenshot" title="Download Screenshot (2x)">Screenshot</button>
    <button id="btn-clean" title="Toggle Clean Mode (for screenshots)">Clean</button>
    <button id="btn-fit" title="Reset View">Fit</button>
  </div>

  <div id="main">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="section">
        <div class="section-title">Layers</div>
        <div id="layer-list"></div>
      </div>
      <div class="section">
        <div class="section-title">Point Style</div>
        <div class="slider-row">
          <label>Size</label>
          <input type="range" id="point-size" min="0.05" max="1.5" step="0.01" value="0.35">
          <span class="value" id="point-size-val">0.35</span>
        </div>
        <div class="toggle-row" id="toggle-pc-rgb">
          <label>Use RGB from file</label>
          <div class="toggle"></div>
        </div>
        <div class="toggle-row" id="toggle-pc-color">
          <label>Custom point color</label>
          <input type="color" id="pc-color" value="#888888" style="width:24px;height:18px;border:1px solid #ccc;border-radius:3px;">
        </div>
      </div>
      <div class="section">
        <div class="section-title">Line Style</div>
        <div class="slider-row">
          <label>Width</label>
          <input type="range" id="line-width" min="0.5" max="10" step="0.1" value="2">
          <span class="value" id="line-width-val">1.5</span>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Display</div>
        <div class="toggle-row" id="toggle-grid">
          <label>Show grid</label>
          <div class="toggle"></div>
        </div>
        <div class="toggle-row" id="toggle-axes">
          <label>Show axes</label>
          <div class="toggle on"></div>
        </div>
        <div class="toggle-row" id="toggle-rotate">
          <label>Auto-rotate</label>
          <div class="toggle"></div>
        </div>
        <div class="toggle-row" id="toggle-sync">
          <label>Sync camera (grid)</label>
          <div class="toggle on"></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Camera</div>
        <div class="slider-row">
          <label>FoV</label>
          <input type="range" id="fov" min="20" max="75" step="1" value="45">
          <span class="value" id="fov-val">45</span>
        </div>
        <div class="slider-row">
          <label>Near</label>
          <input type="range" id="near" min="0.01" max="5" step="0.01" value="0.1">
          <span class="value" id="near-val">0.1</span>
        </div>
      </div>
      <div class="section" id="whole-section" style="display:none;">
        <div class="section-title">Whole Area</div>
        <div class="slider-row">
          <label>Max files</label>
          <input type="number" id="whole-max" value="500" min="10" max="3062" step="10" style="width:80px;">
          <button id="btn-whole-reload" style="font-size:11px;padding:2px 6px;">Reload</button>
        </div>
        <div class="toggle-row" id="toggle-whole-compact">
          <label>Compact grid</label>
          <div class="toggle on"></div>
        </div>
        <div class="slider-row">
          <label>Spacing</label>
          <input type="range" id="whole-spacing" min="0.8" max="3" step="0.1" value="1.2">
          <span class="value" id="whole-spacing-val">1.2</span>
        </div>
        <div class="slider-row">
          <label>Pt scale</label>
          <input type="range" id="whole-pt-scale" min="0.01" max="0.5" step="0.01" value="0.05">
          <span class="value" id="whole-pt-scale-val">0.05</span>
        </div>
      </div>
    </div>

    <!-- Viewport -->
    <div id="viewport-area">
      <div id="viewport">
        <canvas id="single-canvas"></canvas>
        <div id="grid-container" style="display:none;"></div>
      </div>
      <div id="loading-overlay">
        <div style="text-align:center;">
          <div class="spinner"></div>
          <div id="loading-text" style="margin-top:12px;font-size:13px;color:#888;">Loading...</div>
        </div>
      </div>
      <div id="info-bar">
        <span id="info-sample">-</span>
        <span id="info-points">-</span>
        <span id="info-vertices">-</span>
        <span id="info-lines">-</span>
        <span id="info-fps">-</span>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

// ============ Configuration ============
const DATASETS = {
  main: {
    name: 'Main (xyz/gt/pred)',
    listEndpoint: '/api/list',
    layers: {
      pc:           { name: 'Point Cloud',       color: '#888888', defaultOn: true,  type: 'points', folder: 'xyz' },
      gt:           { name: 'GT Wireframe',      color: '#000000', defaultOn: true,  type: 'lines',  folder: 'gt' },
      pred_2048:    { name: 'Pred (2048)',       color: '#d32f2f', defaultOn: true,  type: 'lines',  folder: 'pred_2048' },
      pred_roof:    { name: 'Pred (Roof v3)',    color: '#1976d2', defaultOn: true,  type: 'lines',  folder: 'pred_roof' },
      test_results: { name: 'Test Results',      color: '#7b1fa2', defaultOn: false, type: 'lines',  folder: 'test_results' },
    }
  },
  patch32: {
    name: 'Patch32',
    listEndpoint: '/api/list/patch32',
    layers: {
      patch32:      { name: 'Patch32 σ0.01 c0.01', color: '#f57c00', defaultOn: true,  type: 'lines',  folder: 'patch32' },
      patch32_test: { name: 'Patch32 (test)',       color: '#00897b', defaultOn: true,  type: 'lines',  folder: 'patch32_test' },
    }
  }
};

let currentDataset = 'main';
let LAYER_CONFIG = { ...DATASETS.main.layers };
let listEndpoint = DATASETS.main.listEndpoint;

const API_BASE = '';
let sampleList = [];
let currentSample = null;
let viewMode = 'single';

// Circular point texture so points look like soft dots, not squares
const pointTexture = (() => {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.35)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
})();

// State
const state = {
  layers: {},
  pointSize: 0.35,
  lineWidth: 2,
  useRGB: false,
  pcColor: '#888888',
  bgColor: '#ffffff',
  showGrid: false,
  showAxes: true,
  autoRotate: false,
  syncCamera: true,
  fov: 45,
  near: 0.1,
  wholeCompact: true,
  wholeSpacing: 1.2,
  wholePointScale: 0.05,
};

// Initialize layer states
function initLayerStates() {
  state.layers = {};
  for (const [key, cfg] of Object.entries(LAYER_CONFIG)) {
    state.layers[key] = { on: cfg.defaultOn, color: cfg.color };
  }
}
initLayerStates();

// Data cache
const dataCache = {};
const geometryCache = {};

// ============ Data Loading ============
async function loadSampleList() {
  try {
    const resp = await fetch(`${API_BASE}${listEndpoint}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    sampleList = await resp.json();
    const sel = document.getElementById('sample-select');
    sel.innerHTML = '';
    for (const id of sampleList) {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = id;
      sel.appendChild(opt);
    }
    if (sampleList.length > 0) {
      sel.value = sampleList[0];
      await loadSample(sampleList[0]);
    }
  } catch (e) {
    showError('Failed to load sample list: ' + e.message);
  }
}

async function loadSample(sampleId) {
  showLoading(true);
  currentSample = sampleId;
  document.getElementById('info-sample').textContent = `Sample: ${sampleId}`;

  try {
    // Fetch all data in parallel. Optional layers may 404 and are skipped.
    const keys = Object.keys(LAYER_CONFIG);
    const promises = keys.map(async (key) => {
      if (dataCache[sampleId] && dataCache[sampleId][key] === false) return { key, text: null };
      if (!dataCache[sampleId] || !dataCache[sampleId][key]) {
        const resp = await fetch(`${API_BASE}/api/file/${LAYER_CONFIG[key].folder}/${sampleId}`);
        if (!resp.ok) {
          // Optional layer missing for this sample -> skip silently
          if (!dataCache[sampleId]) dataCache[sampleId] = {};
          dataCache[sampleId][key] = false;
          return { key, text: null };
        }
        const text = await resp.text();
        if (!dataCache[sampleId]) dataCache[sampleId] = {};
        dataCache[sampleId][key] = text;
      }
      return { key, text: dataCache[sampleId][key] };
    });

    const results = await Promise.all(promises);
    const parsed = {};
    for (const { key, text } of results) {
      if (text === null || text === false) continue;  // optional layer absent
      if (LAYER_CONFIG[key].type === 'points') {
        parsed[key] = parseXYZ(text);
      } else {
        parsed[key] = parseOBJ(text);
      }
    }

  // Compute normalization across all data
  const allPoints = [];
  for (const [key, data] of Object.entries(parsed)) {
    if (data.positions) allPoints.push(data.positions);
    if (data.vertices) allPoints.push(data.vertices);
  }
  const norm = computeNormalization(allPoints);

  // Create geometries (missing optional layers get null)
  for (const key of keys) {
    geometryCache[key] = parsed[key] ? createGeometry(key, parsed[key], norm) : null;
  }

  // Update info
  const pcData = parsed['pc'];
  document.getElementById('info-points').textContent =
    pcData ? `Points: ${pcData.count}` : '';
  let totalVerts = 0, totalLines = 0;
  for (const key of Object.keys(LAYER_CONFIG)) {
    if (LAYER_CONFIG[key].type !== 'lines') continue;
    if (parsed[key]) {
      totalVerts += parsed[key].vertexCount || 0;
      totalLines += parsed[key].lineCount || 0;
    }
  }
  document.getElementById('info-vertices').textContent = `Vertices: ${totalVerts}`;
  document.getElementById('info-lines').textContent = `Lines: ${totalLines}`;

  rebuildScene();
  showLoading(false);
  } catch (e) {
    showLoading(false);
    showError('Failed to load sample ' + sampleId + ': ' + e.message);
  }
}

// ============ Whole Area Mode ============
const wholeCache = {};   // folderKey -> { positions, colors, hasRGB } or { vertices, indices }
let wholeLoaded = false;

async function loadWholeArea() {
  const maxFiles = parseInt(document.getElementById('whole-max').value) || 500;
  const compact = document.querySelector('#toggle-whole-compact .toggle').classList.contains('on');
  const spacing = parseFloat(document.getElementById('whole-spacing').value) || 1.2;
  const modeLabel = compact ? 'compact grid' : 'original coords';
  showLoading(true, `Loading whole area (${modeLabel}, max ${maxFiles} files, first build may take a minute)...`);
  document.getElementById('info-sample').textContent = `Whole Area (${modeLabel}, ${maxFiles})`;

  try {
    const keys = Object.keys(LAYER_CONFIG);
    for (const key of keys) {
      const cacheKey = `${key}:${maxFiles}:${compact}:${spacing}`;
      if (wholeCache[cacheKey]) continue;
      const folder = LAYER_CONFIG[key].folder;
      showLoading(true, `Loading ${LAYER_CONFIG[key].name} (${modeLabel}, ${maxFiles} files)...`);

      let resp;
      for (let attempt = 0; attempt < 120; attempt++) {
        resp = await fetch(`${API_BASE}/api/whole/${folder}?max=${maxFiles}&compact=${compact ? 1 : 0}&spacing=${spacing}`);
        if (resp.status === 200) break;
        if (resp.status === 202) {
          await new Promise(r => setTimeout(r, 1000));
          continue;
        }
        throw new Error(`HTTP ${resp.status}`);
      }
      if (!resp || !resp.ok) throw new Error(`Failed to load whole ${key}`);

      const buf = await resp.arrayBuffer();
      wholeCache[cacheKey] = parseWholeBinary(key, buf);
    }
    wholeLoaded = true;

    // Build geometries using union of all positions for normalization
    const allPts = [];
    for (const key of keys) {
      const d = wholeCache[`${key}:${maxFiles}:${compact}:${spacing}`];
      if (d && d.positions) allPts.push(d.positions);
      if (d && d.vertices) allPts.push(d.vertices);
    }
    const norm = computeNormalization(allPts);
    for (const key of keys) {
      geometryCache[key] = createWholeGeometry(key, wholeCache[`${key}:${maxFiles}:${compact}:${spacing}`], norm);
    }

    // Update info
    const pc = wholeCache[`pc:${maxFiles}:${compact}:${spacing}`];
    document.getElementById('info-points').textContent =
      pc ? `Points: ${pc.count}` : '';
    let tv = 0, tl = 0;
    for (const k of Object.keys(LAYER_CONFIG)) {
      if (LAYER_CONFIG[k].type !== 'lines') continue;
      const d = wholeCache[`${k}:${maxFiles}:${compact}:${spacing}`];
      if (d) {
        tv += d.vertexCount || 0;
        tl += d.lineCount || 0;
      }
    }
    document.getElementById('info-vertices').textContent = `Vertices: ${tv}`;
    document.getElementById('info-lines').textContent = `Lines: ${tl}`;

    rebuildScene();
    showLoading(false);
  } catch (e) {
    showLoading(false);
    showError('Whole area load failed: ' + e.message);
  }
}

function parseWholeBinary(key, buf) {
  const view = new DataView(buf);
  const magic = String.fromCharCode(view.getUint8(0), view.getUint8(1),
                                    view.getUint8(2), view.getUint8(3));
  if (magic === 'PC00') {
    const count = view.getUint32(4, true);
    const hasRGB = view.getUint8(8) === 1;
    const posOffset = 12;  // 4 magic + 4 count + 1 rgb + 3 pad
    const positions = new Float32Array(buf, posOffset, count * 3);
    let colors = null;
    if (hasRGB) {
      colors = new Float32Array(buf, posOffset + count * 3 * 4, count * 3);
    }
    return { positions: new Float32Array(positions), colors: colors ? new Float32Array(colors) : null,
             hasRGB, count };
  } else if (magic === 'WF00') {
    const vCount = view.getUint32(4, true);
    const iCount = view.getUint32(8, true);
    const vertices = new Float32Array(buf, 12, vCount * 3);
    const indices = new Uint32Array(buf, 12 + vCount * 3 * 4, iCount);
    return { vertices: new Float32Array(vertices), indices: new Uint32Array(indices),
             vertexCount: vCount, lineCount: iCount / 2 };
  }
  throw new Error('Unknown binary magic: ' + magic);
}

function createWholeGeometry(key, data, norm) {
  const geo = new THREE.BufferGeometry();
  const { cx, cy, cz, scale } = norm;
  const cfg = LAYER_CONFIG[key];

  if (cfg.type === 'points') {
    const src = data.positions;
    const out = new Float32Array(src.length);
    for (let i = 0; i < src.length; i += 3) {
      out[i]     = (src[i]     - cx) * scale;
      out[i + 1] = (src[i + 1] - cy) * scale;
      out[i + 2] = (src[i + 2] - cz) * scale;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(out, 3));
    if (data.hasRGB && data.colors) {
      geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(data.colors), 3));
    }
  } else {
    const src = data.vertices;
    const out = new Float32Array(src.length);
    for (let i = 0; i < src.length; i += 3) {
      out[i]     = (src[i]     - cx) * scale;
      out[i + 1] = (src[i + 1] - cy) * scale;
      out[i + 2] = (src[i + 2] - cz) * scale;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(out, 3));
    if (data.indices && data.indices.length > 0) {
      geo.setIndex(new THREE.BufferAttribute(new Uint32Array(data.indices), 1));
    }
  }
  return geo;
}

function parseXYZ(text) {
  const lines = text.trim().split('\n');
  const positions = new Float32Array(lines.length * 3);
  const colors = new Float32Array(lines.length * 3);
  let count = 0;
  for (let i = 0; i < lines.length; i++) {
    const parts = lines[i].trim().split(/\s+/);
    if (parts.length < 3) continue;
    positions[count * 3]     = parseFloat(parts[0]);
    positions[count * 3 + 1] = parseFloat(parts[1]);
    positions[count * 3 + 2] = parseFloat(parts[2]);
    if (parts.length >= 6) {
      const r = parseFloat(parts[3]) / 255;
      const g = parseFloat(parts[4]) / 255;
      const b = parseFloat(parts[5]) / 255;
      colors[count * 3]     = r;
      colors[count * 3 + 1] = g;
      colors[count * 3 + 2] = b;
    }
    count++;
  }
  return {
    positions: positions.slice(0, count * 3),
    colors: colors.slice(0, count * 3),
    hasRGB: lines[0] && lines[0].trim().split(/\s+/).length >= 6,
    count
  };
}

function parseOBJ(text) {
  const lines = text.trim().split('\n');
  const vertices = [];
  const lineIndices = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('v ')) {
      const parts = trimmed.split(/\s+/).slice(1);
      vertices.push(parseFloat(parts[0]), parseFloat(parts[1]), parseFloat(parts[2]));
    } else if (trimmed.startsWith('l ')) {
      const parts = trimmed.split(/\s+/).slice(1).map(s => parseInt(s) - 1);
      for (let i = 0; i < parts.length - 1; i++) {
        lineIndices.push(parts[i], parts[i + 1]);
      }
    } else if (trimmed.startsWith('f ')) {
      const parts = trimmed.split(/\s+/).slice(1).map(s => parseInt(s.split('/')[0]) - 1);
      for (let i = 0; i < parts.length; i++) {
        lineIndices.push(parts[i], parts[(i + 1) % parts.length]);
      }
    }
  }
  return {
    positions: new Float32Array(vertices),
    indices: new Uint32Array(lineIndices),
    vertexCount: vertices.length / 3,
    lineCount: lineIndices.length / 2,
  };
}

function computeNormalization(positionArrays) {
  let minX = Infinity, minY = Infinity, minZ = Infinity;
  let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
  for (const arr of positionArrays) {
    for (let i = 0; i < arr.length; i += 3) {
      minX = Math.min(minX, arr[i]);
      minY = Math.min(minY, arr[i + 1]);
      minZ = Math.min(minZ, arr[i + 2]);
      maxX = Math.max(maxX, arr[i]);
      maxY = Math.max(maxY, arr[i + 1]);
      maxZ = Math.max(maxZ, arr[i + 2]);
    }
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const cz = (minZ + maxZ) / 2;
  const sizeX = maxX - minX;
  const sizeY = maxY - minY;
  const sizeZ = maxZ - minZ;
  const maxSize = Math.max(sizeX, sizeY, sizeZ);
  const scale = 2 / maxSize;  // fit in [-1, 1]
  return { cx, cy, cz, scale };
}

function createGeometry(key, data, norm) {
  const geo = new THREE.BufferGeometry();
  const { cx, cy, cz, scale } = norm;

  if (LAYER_CONFIG[key].type === 'points') {
    const positions = data.positions;
    const normalized = new Float32Array(positions.length);
    for (let i = 0; i < positions.length; i += 3) {
      normalized[i]     = (positions[i]     - cx) * scale;
      normalized[i + 1] = (positions[i + 1] - cy) * scale;
      normalized[i + 2] = (positions[i + 2] - cz) * scale;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(normalized, 3));
    if (data.hasRGB) {
      geo.setAttribute('color', new THREE.BufferAttribute(data.colors, 3));
    }
  } else {
    const positions = data.positions;
    const normalized = new Float32Array(positions.length);
    for (let i = 0; i < positions.length; i += 3) {
      normalized[i]     = (positions[i]     - cx) * scale;
      normalized[i + 1] = (positions[i + 1] - cy) * scale;
      normalized[i + 2] = (positions[i + 2] - cz) * scale;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(normalized, 3));
    if (data.indices.length > 0) {
      geo.setIndex(new THREE.BufferAttribute(data.indices, 1));
    }
  }
  return geo;
}

const canvas = document.getElementById('single-canvas');
const renderer = new THREE.WebGLRenderer({
  canvas: canvas,
  antialias: true,
  preserveDrawingBuffer: true,  // for screenshots
  alpha: false,
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(new THREE.Color(state.bgColor));

const scene = new THREE.Scene();
scene.background = new THREE.Color(state.bgColor);

const camera = new THREE.PerspectiveCamera(state.fov, 1, state.near, 100);
camera.position.set(3, 3, 3);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Grid and axes helpers
let gridHelper = null;
let axesHelper = null;

// Object groups
const layerObjects = {};
for (const key of Object.keys(LAYER_CONFIG)) {
  layerObjects[key] = null;
}

// Grid mode: multiple renderers
let gridRenderers = [];
let gridScenes = [];
let gridCameras = [];
let gridControls = [];
let gridObjects = [];  // array of {key: object}

function getEffectivePointSize() {
  // In whole compact mode points are tiny relative to the unit-scaled buildings
  if (viewMode === 'whole' && state.wholeCompact) {
    return state.pointSize * state.wholePointScale;
  }
  return state.pointSize;
}

function rebuildScene() {
  // Clear existing
  for (const key of Object.keys(LAYER_CONFIG)) {
    if (layerObjects[key]) {
      scene.remove(layerObjects[key]);
      layerObjects[key] = null;
    }
  }
  // Reset line material list (new objects will register themselves)
  lineMaterials.length = 0;
  if (gridHelper) { scene.remove(gridHelper); gridHelper = null; }
  if (axesHelper) { scene.remove(axesHelper); axesHelper = null; }

  // Create objects
  for (const key of Object.keys(LAYER_CONFIG)) {
    if (!geometryCache[key]) continue;
    const cfg = LAYER_CONFIG[key];
    const layerState = state.layers[key];

    let obj;
    if (cfg.type === 'points') {
      const mat = new THREE.PointsMaterial({
        size: getEffectivePointSize(),
        sizeAttenuation: true,
        map: pointTexture,
        transparent: true,
        alphaTest: 0.05,
        vertexColors: state.useRGB && geometryCache[key].getAttribute('color'),
        color: new THREE.Color(state.useRGB ? '#ffffff' : state.pcColor),
      });
      obj = new THREE.Points(geometryCache[key], mat);
    } else {
      obj = makeLineObject(geometryCache[key], new THREE.Color(layerState.color));
    }
    obj.visible = layerState.on;
    layerObjects[key] = obj;
    scene.add(obj);
  }

  // Grid helper
  if (state.showGrid) {
    gridHelper = new THREE.GridHelper(4, 20, 0xcccccc, 0xe0e0e0);
    gridHelper.position.y = -1.01;
    scene.add(gridHelper);
  }

  // Axes helper
  if (state.showAxes) {
    axesHelper = new THREE.AxesHelper(1.5);
    axesHelper.position.set(-2, -1, -2);
    scene.add(axesHelper);
  }

  // Rebuild grid if in grid mode
  if (viewMode.startsWith('grid')) {
    rebuildGrid();
  }

  fitView();
}

function rebuildGrid() {
  const container = document.getElementById('grid-container');
  container.innerHTML = '';
  gridRenderers = [];
  gridScenes = [];
  gridCameras = [];
  gridControls = [];
  gridObjects = [];

  let layout = '2x2';
  let cellCount = 4;
  if (viewMode === 'grid-1x4') { layout = '1x4'; cellCount = 4; }
  else if (viewMode === 'grid-1x3') { layout = '1x3'; cellCount = 3; }

  container.className = `layout-${layout}`;

  // Default cell configs
  const cellConfigs = [
    { layer: 'pc',        label: 'Point Cloud' },
    { layer: 'gt',        label: 'GT' },
    { layer: 'pred_2048', label: 'Pred (2048)' },
    { layer: 'pred_roof', label: 'Pred (Roof v3)' },
  ];

  for (let i = 0; i < cellCount; i++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';

    const cfg = cellConfigs[i] || cellConfigs[0];

    const label = document.createElement('div');
    label.className = 'grid-label';
    label.textContent = cfg.label;
    cell.appendChild(label);

    const sel = document.createElement('select');
    for (const [key, lcfg] of Object.entries(LAYER_CONFIG)) {
      const opt = document.createElement('option');
      opt.value = key; opt.textContent = lcfg.name;
      if (key === cfg.layer) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.addEventListener('change', () => updateGridCell(i, sel.value, label));
    cell.appendChild(sel);

    const cellCanvas = document.createElement('canvas');
    cell.appendChild(cellCanvas);

    container.appendChild(cell);

    // Setup renderer
    const r = new THREE.WebGLRenderer({
      canvas: cellCanvas,
      antialias: true,
      preserveDrawingBuffer: true,
      alpha: false,
    });
    r.setPixelRatio(window.devicePixelRatio);
    r.setClearColor(new THREE.Color(state.bgColor));

    const s = new THREE.Scene();
    s.background = new THREE.Color(state.bgColor);

    const c = new THREE.PerspectiveCamera(state.fov, 1, state.near, 100);
    c.position.copy(camera.position);
    c.lookAt(0, 0, 0);

    const ctrl = new OrbitControls(c, cellCanvas);
    ctrl.enableDamping = true;
    ctrl.dampingFactor = 0.08;

    gridRenderers.push(r);
    gridScenes.push(s);
    gridCameras.push(c);
    gridControls.push(ctrl);

    // Create object for this cell
    const obj = createLayerObject(cfg.layer);
    s.add(obj);
    gridObjects.push({ key: cfg.layer, obj: obj });
  }

  // Sync cameras
  syncGridCameras();

  // Add grid/axes to each scene
  for (const s of gridScenes) {
    if (state.showGrid) {
      const gh = new THREE.GridHelper(4, 20, 0xcccccc, 0xe0e0e0);
      gh.position.y = -1.01;
      s.add(gh);
    }
    if (state.showAxes) {
      const ah = new THREE.AxesHelper(1.5);
      ah.position.set(-2, -1, -2);
      s.add(ah);
    }
  }

  // Sync controls
  for (let i = 0; i < gridControls.length; i++) {
    gridControls[i].addEventListener('change', () => {
      if (state.syncCamera) {
        syncGridCameras();
      }
    });
  }
}

function createLayerObject(key) {
  if (!geometryCache[key]) return new THREE.Group();
  const cfg = LAYER_CONFIG[key];
  const layerState = state.layers[key];

  if (cfg.type === 'points') {
    const mat = new THREE.PointsMaterial({
      size: getEffectivePointSize(),
      sizeAttenuation: true,
      map: pointTexture,
      transparent: true,
      alphaTest: 0.05,
      vertexColors: state.useRGB && geometryCache[key].getAttribute('color'),
      color: new THREE.Color(state.useRGB ? '#ffffff' : state.pcColor),
    });
    return new THREE.Points(geometryCache[key], mat);
  } else {
    return makeLineObject(geometryCache[key], new THREE.Color(layerState.color));
  }
}

// ============ Line helpers (LineSegments2 supports real line width) ============
const lineMaterials = [];   // all LineMaterial instances, for resolution + width updates
let _lineResolution = new THREE.Vector2(800, 600);

function makeLineObject(geo, color) {
  // geo is a BufferGeometry with 'position' (per-vertex) and optional 'index' (line pairs)
  const posAttr = geo.getAttribute('position');
  const idxAttr = geo.getIndex();
  const segments = expandLineSegments(posAttr.array, idxAttr ? idxAttr.array : null);

  const segGeo = new LineSegmentsGeometry();
  segGeo.setPositions(segments);

  const mat = new LineMaterial({
    color: color,
    linewidth: state.lineWidth,           // in pixels
    worldUnits: false,                  // screen-space pixels
    dashed: false,
    alphaToCoverage: true,
    resolution: _lineResolution,
    transparent: true,
  });
  mat.linewidth = Math.max(0.5, state.lineWidth);
  lineMaterials.push(mat);

  const obj = new LineSegments2(segGeo, mat);
  obj.computeLineDistances();
  obj.renderOrder = 1;
  return obj;
}

function expandLineSegments(positions, indices) {
  // Returns Float32Array of [x1,y1,z1, x2,y2,z2, ...] for each segment
  if (indices && indices.length > 0) {
    const out = new Float32Array(indices.length * 3);
    for (let i = 0; i < indices.length; i++) {
      const vi = indices[i] * 3;
      out[i * 3]     = positions[vi];
      out[i * 3 + 1] = positions[vi + 1];
      out[i * 3 + 2] = positions[vi + 2];
    }
    return out;
  }
  // No index: assume positions are already paired segments
  return new Float32Array(positions);
}

function updateLineResolution(w, h) {
  _lineResolution.set(w, h);
  for (const m of lineMaterials) {
    m.resolution.set(w, h);
  }
}

function updateLineWidth() {
  for (const m of lineMaterials) {
    m.linewidth = Math.max(0.5, state.lineWidth);
    m.needsUpdate = true;
  }
}

function updateGridCell(idx, layerKey, label) {
  const s = gridScenes[idx];
  const old = gridObjects[idx];
  if (old.obj) s.remove(old.obj);

  const obj = createLayerObject(layerKey);
  s.add(obj);
  gridObjects[idx] = { key: layerKey, obj: obj };
  label.textContent = LAYER_CONFIG[layerKey].name;
}

function syncGridCameras() {
  if (gridCameras.length === 0) return;
  // Use the main camera as reference, or the first grid camera
  const ref = camera;
  for (let i = 0; i < gridCameras.length; i++) {
    gridCameras[i].position.copy(ref.position);
    gridCameras[i].quaternion.copy(ref.quaternion);
    gridCameras[i].fov = ref.fov;
    gridCameras[i].near = ref.near;
    gridCameras[i].far = ref.far;
    gridCameras[i].updateProjectionMatrix();
  }
}

function syncMainFromGrid() {
  // Update main camera from first grid camera
  if (gridCameras.length > 0) {
    camera.position.copy(gridCameras[0].position);
    camera.quaternion.copy(gridCameras[0].quaternion);
    camera.fov = gridCameras[0].fov;
    camera.updateProjectionMatrix();
  }
}

function fitView() {
  // Compute bounding box of visible objects
  const box = new THREE.Box3();
  let hasContent = false;
  for (const key of Object.keys(LAYER_CONFIG)) {
    if (layerObjects[key] && layerObjects[key].visible) {
      box.expandByObject(layerObjects[key]);
      hasContent = true;
    }
  }
  if (!hasContent) {
    box.set(new THREE.Vector3(-1, -1, -1), new THREE.Vector3(1, 1, 1));
  }

  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxSize = Math.max(size.x, size.y, size.z) || 2;
  const fitDist = maxSize / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));

  camera.position.set(center.x + fitDist * 0.7, center.y + fitDist * 0.7, center.z + fitDist * 0.7);
  camera.lookAt(center);
  controls.target.copy(center);
  controls.update();

  // Sync grid cameras
  syncGridCameras();
}

// ============ Render Loop ============
let lastTime = performance.now();
let frameCount = 0;
let fpsTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = now - lastTime;
  lastTime = now;

  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 500) {
    document.getElementById('info-fps').textContent = `${Math.round(frameCount * 1000 / fpsTime)} FPS`;
    frameCount = 0;
    fpsTime = 0;
  }

  if (state.autoRotate) {
    const speed = 0.3;
    if (viewMode === 'single' || viewMode === 'whole') {
      const pos = camera.position;
      const angle = speed * dt * 0.001;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const x = pos.x * cos - pos.z * sin;
      const z = pos.x * sin + pos.z * cos;
      pos.x = x; pos.z = z;
      camera.lookAt(controls.target);
    }
  }

  if (viewMode === 'single' || viewMode === 'whole') {
    controls.update();
    renderer.render(scene, camera);
  } else if (viewMode.startsWith('grid')) {
    // Grid mode
    for (let i = 0; i < gridRenderers.length; i++) {
      if (!gridRenderers[i]) continue;
      gridControls[i].update();
      if (state.syncCamera && i > 0) {
        gridCameras[i].position.copy(gridCameras[0].position);
        gridCameras[i].quaternion.copy(gridCameras[0].quaternion);
      }
      gridRenderers[i].render(gridScenes[i], gridCameras[i]);
    }
    // Also update main camera for fitView reference
    if (gridCameras.length > 0) {
      camera.position.copy(gridCameras[0].position);
      camera.quaternion.copy(gridCameras[0].quaternion);
    }
  }
}

// ============ Resize ============
function onResize() {
  const area = document.getElementById('viewport-area');
  if (!area) return;
  const w = area.clientWidth || 800;
  const h = area.clientHeight || 600;

  if (viewMode === 'single' || viewMode === 'whole') {
    canvas.style.display = 'block';
    document.getElementById('grid-container').style.display = 'none';
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    // LineMaterial resolution is in actual drawing pixels
    const dpr = renderer.getPixelRatio();
    updateLineResolution(w * dpr, h * dpr);
  } else if (viewMode.startsWith('grid')) {
    canvas.style.display = 'none';
    const gridContainer = document.getElementById('grid-container');
    gridContainer.style.display = 'grid';

    for (let i = 0; i < gridRenderers.length; i++) {
      const cell = gridContainer.children[i];
      if (!cell) continue;
      const cw = cell.clientWidth || 400;
      const ch = cell.clientHeight || 300;
      gridRenderers[i].setSize(cw, ch, false);
      gridCameras[i].aspect = cw / ch;
      gridCameras[i].updateProjectionMatrix();
    }
    // Use a representative cell size for line resolution
    const first = gridContainer.children[0];
    if (first) {
      const cw = first.clientWidth || 400;
      const ch = first.clientHeight || 300;
      const dpr = renderer.getPixelRatio();
      updateLineResolution(cw * dpr, ch * dpr);
    }
  }
}
window.addEventListener('resize', onResize);

// ============ UI Setup ============
function buildLayerList() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  for (const [key, cfg] of Object.entries(LAYER_CONFIG)) {
    const item = document.createElement('div');
    item.className = 'layer-item';
    item.dataset.key = key;
    item.style.setProperty('--layer-color', state.layers[key].color);

    const cb = document.createElement('div');
    cb.className = 'layer-checkbox';
    if (state.layers[key].on) item.classList.add('checked');

    const color = document.createElement('div');
    color.className = 'layer-color';
    color.style.background = state.layers[key].color;

    const name = document.createElement('div');
    name.className = 'layer-name';
    name.textContent = cfg.name;

    item.appendChild(cb);
    item.appendChild(color);
    item.appendChild(name);

    // Color picker
    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.value = state.layers[key].color;
    colorInput.style.width = '20px';
    colorInput.style.height = '18px';
    colorInput.style.border = '1px solid #ccc';
    colorInput.style.borderRadius = '3px';
    colorInput.style.cursor = 'pointer';
    colorInput.addEventListener('change', () => {
      state.layers[key].color = colorInput.value;
      color.style.background = colorInput.value;
      item.style.setProperty('--layer-color', colorInput.value);
      updateLayerColor(key);
    });
    item.appendChild(colorInput);

    item.addEventListener('click', (e) => {
      if (e.target === colorInput) return;
      state.layers[key].on = !state.layers[key].on;
      item.classList.toggle('checked');
      if (layerObjects[key]) layerObjects[key].visible = state.layers[key].on;
    });

    list.appendChild(item);
  }
}

function updateLayerColor(key) {
  const c = new THREE.Color(state.layers[key].color);
  if (layerObjects[key]) {
    layerObjects[key].material.color = c;
    layerObjects[key].material.uniforms = layerObjects[key].material.uniforms || {};
    layerObjects[key].material.needsUpdate = true;
  }
  for (const go of gridObjects) {
    if (go.key === key && go.obj) {
      go.obj.material.color = new THREE.Color(state.layers[key].color);
      go.obj.material.needsUpdate = true;
    }
  }
}

    document.getElementById('sample-select').value = sampleList[idx + 1];
    loadSample(sampleList[idx + 1]).then(onResize);
  }
});

document.getElementById('view-mode').addEventListener('change', (e) => {
  viewMode = e.target.value;
  if (viewMode === 'single') {
    document.querySelector('#sidebar .section:nth-child(1)').style.display = '';
  }
  // Show/hide whole-area section
  document.getElementById('whole-section').style.display =
    (viewMode === 'whole') ? '' : 'none';
  onResize();
  if (viewMode.startsWith('grid')) {
    rebuildGrid();
    onResize();
  } else if (viewMode === 'whole') {
    loadWholeArea().then(() => onResize());
  }
});

document.getElementById('btn-whole-reload').addEventListener('click', () => {
  // Clear whole cache to force reload
  for (const k of Object.keys(wholeCache)) delete wholeCache[k];
  loadWholeArea().then(() => onResize());
});

// ============ Dataset Switch ============
document.getElementById('dataset-select').addEventListener('change', async (e) => {
  const ds = e.target.value;
  if (ds === currentDataset) return;
  currentDataset = ds;
  const cfg = DATASETS[ds];
  LAYER_CONFIG = { ...cfg.layers };
  listEndpoint = cfg.listEndpoint;
  initLayerStates();
  // Clear caches for old dataset
  for (const k of Object.keys(dataCache)) delete dataCache[k];
  for (const k of Object.keys(geometryCache)) delete geometryCache[k];
  // Reset layer objects
  for (const key of Object.keys(layerObjects)) {
    if (layerObjects[key]) {
      scene.remove(layerObjects[key]);
      layerObjects[key] = null;
    }
  }
  lineMaterials.length = 0;
  // Rebuild UI
  buildLayerList();
  // Reload samples
  await loadSampleList();
  onResize();
});

setupToggle('toggle-whole-compact', 'wholeCompact', () => {
  for (const k of Object.keys(wholeCache)) delete wholeCache[k];
  loadWholeArea().then(() => onResize());
});

document.getElementById('whole-spacing').addEventListener('input', (e) => {
  const val = parseFloat(e.target.value);
  document.getElementById('whole-spacing-val').textContent = val.toFixed(1);
});
document.getElementById('whole-spacing').addEventListener('change', () => {
  for (const k of Object.keys(wholeCache)) delete wholeCache[k];
  loadWholeArea().then(() => onResize());
});

document.getElementById('whole-pt-scale').addEventListener('input', (e) => {
  const val = parseFloat(e.target.value);
  state.wholePointScale = val;
  document.getElementById('whole-pt-scale-val').textContent = val.toFixed(2);
  // Rebuild point materials in whole mode without full reload
  if (viewMode === 'whole') {
    rebuildScene();
  }
});

document.getElementById('bg-color').addEventListener('input', (e) => {
  state.bgColor = e.target.value;
  scene.background = new THREE.Color(state.bgColor);
  renderer.setClearColor(new THREE.Color(state.bgColor));
  for (const s of gridScenes) {
    s.background = new THREE.Color(state.bgColor);
  }
  for (const r of gridRenderers) {
    r.setClearColor(new THREE.Color(state.bgColor));
  }
});

document.getElementById('btn-screenshot').addEventListener('click', () => {
  // Render at 2x resolution
  const oldPR = renderer.getPixelRatio();
  const factor = 2;

  if (viewMode === 'single' || viewMode === 'whole') {
    renderer.setPixelRatio(factor);
    // Update line resolution for high-res render
    const area = document.getElementById('viewport-area');
    const sw = (area?.clientWidth || 800) * factor;
    const sh = (area?.clientHeight || 600) * factor;
    updateLineResolution(sw, sh);
    renderer.render(scene, camera);
    const dataURL = renderer.domElement.toDataURL('image/png');
    const fname = viewMode === 'whole'
      ? 'whole_area.png'
      : `${currentSample}_overlay.png`;
    downloadDataURL(dataURL, fname);
    renderer.setPixelRatio(oldPR);
  } else if (viewMode.startsWith('grid') && gridRenderers.length > 0) {
    // Grid mode: save each cell as a separate PNG file
    const gridContainer = document.getElementById('grid-container');
    const cells = gridContainer.children;
    const cellCount = cells.length;
    if (cellCount === 0) return;

    for (let i = 0; i < gridRenderers.length; i++) {
      if (!gridRenderers[i]) continue;
      gridRenderers[i].setPixelRatio(factor);
      // Update line resolution for this cell at 2x
      const cw = (cells[i]?.clientWidth || 400);
      const ch = (cells[i]?.clientHeight || 300);
      const mat = gridObjects[i] && gridObjects[i].obj && gridObjects[i].obj.material;
      if (mat && mat.resolution) {
        mat.resolution.set(cw * factor, ch * factor);
        mat.needsUpdate = true;
      }
      gridRenderers[i].render(gridScenes[i], gridCameras[i]);
      const dataURL = gridRenderers[i].domElement.toDataURL('image/png');
      // Build a clean filename: <sample>_<layerKey>.png
      const layerKey = gridObjects[i] ? gridObjects[i].key : `cell${i}`;
      const label = LAYER_CONFIG[layerKey] ? LAYER_CONFIG[layerKey].name.replace(/[^A-Za-z0-9]+/g, '_') : layerKey;
      downloadDataURL(dataURL, `${currentSample || 'whole'}_${label}.png`);
      gridRenderers[i].setPixelRatio(oldPR);
      // Restore line resolution to viewport size
      if (mat && mat.resolution) {
        mat.resolution.set(cw * oldPR, ch * oldPR);
        mat.needsUpdate = true;
      }
    }
  }
});

document.getElementById('btn-clean').addEventListener('click', () => {
  document.body.classList.toggle('clean');
  onResize();
});

document.getElementById('btn-fit').addEventListener('click', () => {
  fitView();
  onResize();
});

// Sliders
document.getElementById('point-size').addEventListener('input', (e) => {
  state.pointSize = parseFloat(e.target.value);
  document.getElementById('point-size-val').textContent = state.pointSize.toFixed(2);
  updatePointMaterial();
});

document.getElementById('line-width').addEventListener('input', (e) => {
  state.lineWidth = parseFloat(e.target.value);
  document.getElementById('line-width-val').textContent = state.lineWidth.toFixed(1);
  updateLineMaterial();
});

document.getElementById('fov').addEventListener('input', (e) => {
  state.fov = parseInt(e.target.value);
  document.getElementById('fov-val').textContent = state.fov;
  camera.fov = state.fov;
  camera.updateProjectionMatrix();
  for (const c of gridCameras) {
    c.fov = state.fov;
    c.updateProjectionMatrix();
  }
});

document.getElementById('near').addEventListener('input', (e) => {
  state.near = parseFloat(e.target.value);
  document.getElementById('near-val').textContent = state.near.toFixed(2);
  camera.near = state.near;
  camera.updateProjectionMatrix();
  for (const c of gridCameras) {
    c.near = state.near;
    c.updateProjectionMatrix();
  }
});

// Toggles
function setupToggle(id, key, callback) {
  const toggle = document.querySelector(`#${id} .toggle`);
  toggle.addEventListener('click', () => {
    state[key] = !state[key];
    toggle.classList.toggle('on');
    if (callback) callback();
  });
}

setupToggle('toggle-pc-rgb', 'useRGB', () => {
  updatePointMaterial();
});

document.getElementById('pc-color').addEventListener('input', (e) => {
  state.pcColor = e.target.value;
  updatePointMaterial();
});

setupToggle('toggle-grid', 'showGrid', () => {
  rebuildScene();
});

setupToggle('toggle-axes', 'showAxes', () => {
  rebuildScene();
});

setupToggle('toggle-rotate', 'autoRotate', () => {});

setupToggle('toggle-sync', 'syncCamera', () => {
  if (state.syncCamera) syncGridCameras();
});

function updatePointMaterial() {
  const eff = getEffectivePointSize();
  for (const key of Object.keys(LAYER_CONFIG)) {
    if (LAYER_CONFIG[key].type !== 'points') continue;
    if (layerObjects[key]) {
      layerObjects[key].material.size = eff;
      layerObjects[key].material.vertexColors = state.useRGB && geometryCache[key].getAttribute('color');
      layerObjects[key].material.color = new THREE.Color(state.useRGB ? '#ffffff' : state.pcColor);
      layerObjects[key].material.needsUpdate = true;
    }
    for (const go of gridObjects) {
      if (go.key === key && go.obj) {
        go.obj.material.size = eff;
        go.obj.material.vertexColors = state.useRGB && geometryCache[key].getAttribute('color');
        go.obj.material.color = new THREE.Color(state.useRGB ? '#ffffff' : state.pcColor);
        go.obj.material.needsUpdate = true;
      }
    }
  }
}

function updateLineMaterial() {
  // LineMaterial needs explicit resolution-aware width update (in pixels)
  updateLineWidth();
}

function downloadDataURL(dataURL, filename) {
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft') document.getElementById('btn-prev').click();
  if (e.key === 'ArrowRight') document.getElementById('btn-next').click();
  if (e.key === 'f' || e.key === 'F') document.getElementById('btn-fit').click();
  if (e.key === 'c' || e.key === 'C') document.getElementById('btn-clean').click();
  if (e.key === 's' || e.key === 'S') document.getElementById('btn-screenshot').click();
});

// ============ Init ============
buildLayerList();
onResize();
animate();
loadSampleList().then(() => {
  onResize();
}).catch(e => {
  showError('Init failed: ' + e.message);
});

// Global error handler
window.addEventListener('error', (e) => {
  showError(e.message || 'Unknown error');
});
window.addEventListener('unhandledrejection', (e) => {
  showError(e.reason || 'Promise rejected');
});
</script>
</body>
</html>
